<style>
:root{
  --bg:#0E1310; --surface:#161C18; --surface-2:#1E2620; --surface-3:#242D26;
  --border:#2A322B; --border-strong:#38423A;

*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);}
.disp{font-family:'Space Grotesk',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
.app{display:flex;min-height:100vh;}
.sidebar{width:216px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;}
.brand{display:flex;align-items:center;gap:8px;padding:4px 8px 20px;}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--env);}
.brand span{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;letter-spacing:.2px;}
.navbtn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:var(--text-mid);font-size:13.5px;font-family:inherit;cursor:pointer;text-align:left;width:100%;}
.navbtn:hover{background:var(--surface-2);color:var(--text);}
.navbtn.active{background:var(--surface-2);color:var(--text);}
.navbtn.active .bar{background:var(--env);}
.bar{width:3px;height:16px;border-radius:2px;background:transparent;margin-right:-4px;}
.navsec{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:14px 10px 4px;}
.spacer{flex:1;}
.wallet{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.wallet .lbl{font-size:11px;color:var(--text-muted);}
.wallet .val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:var(--xp-text);margin-top:2px;}
.main{flex:1;padding:26px 34px 60px;max-width:1180px;}
.topline{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;}
.h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;margin:0 0 4px;}
.sub{color:var(--text-muted);font-size:13.5px;margin:0;}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 9px;border-radius:20px;font-weight:500;}
.pill.env{background:var(--env-bg);color:var(--env-text);}
.pill.soc{background:var(--soc-bg);color:var(--soc-text);}
.pill.gov{background:var(--gov-bg);color:var(--gov-text);}
.pill.xp{background:var(--xp-bg);color:var(--xp-text);}
.pill.danger{background:var(--danger-bg);color:var(--danger-text);}
.pill.neutral{background:var(--surface-2);color:var(--text-mid);}
.grid{display:grid;gap:14px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.card h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
.metric-lbl{font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.metric-val{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;margin-top:4px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);font-weight:500;padding:7px 8px;border-bottom:1px solid var(--border);}
td{padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text-mid);}
tr:last-child td{border-bottom:none;}
td.num,th.num{text-align:right;font-family:'JetBrains Mono',monospace;}
.barbg{background:var(--surface-3);border-radius:5px;height:6px;overflow:hidden;}
.barfill{height:100%;border-radius:5px;}
select,button.btn{font-family:inherit;font-size:12.5px;background:var(--surface-2);color:var(--text);border:1px solid var(--border-strong);border-radius:7px;padding:6px 10px;cursor:pointer;}
button.btn:hover{background:var(--surface-3);}
button.btn:disabled{opacity:.4;cursor:not-allowed;}
button.btn.primary{background:var(--env-bg);color:var(--env-text);border-color:var(--env);}
button.btn.danger{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger);}
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
input[type=range]{accent-color:var(--env);width:100%;}
.toggle{position:relative;width:38px;height:21px;border-radius:20px;background:var(--surface-3);border:1px solid var(--border-strong);cursor:pointer;flex-shrink:0;}
.toggle .knob{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--text-muted);transition:.15s;}
.toggle.on{background:var(--env-bg);border-color:var(--env);}
.toggle.on .knob{left:19px;background:var(--env);}
.settingrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.settingrow:last-child{border-bottom:none;}
.settingrow .lbl{font-size:13px;}
.settingrow .desc{font-size:11.5px;color:var(--text-muted);margin-top:2px;}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.kcol{background:var(--surface-2);border-radius:9px;padding:9px;min-height:60px;}
.kcol h4{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin:0 0 8px;padding:0 2px;}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 9px;margin-bottom:7px;font-size:12px;}
.kcard .t{font-weight:500;margin-bottom:3px;}
.kcard .m{color:var(--text-muted);font-size:11px;}
.badgegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.badge{border-radius:9px;padding:12px;text-align:center;border:1px solid var(--border);}
.badge.locked{opacity:.38;}
.badge .ic{width:34px;height:34px;border-radius:50%;background:var(--xp-bg);color:var(--xp-text);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:16px;}

.badge .r{font-size:10.5px;color:var(--text-muted);margin-top:3px;}

.progress-wrap{margin-bottom:10px;}
.progress-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);}

.lb-rank{width:20px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:12px;}

.section-hidden{display:none;}

::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}

/* ============ SCORE CALC ============ */

function deptScores(){
  return departments.map(d=>{
    const seed = d.id.charCodeAt(1);
    const e = clamp(58 + (seed*13)%35, 40, 96);
    const s = clamp(50 + (seed*7)%40, 35, 95);
    const g = clamp(55 + (seed*17)%33, 38, 94);
    const total = Math.round(e*state.weights.e/100 + s*state.weights.s/100 + g*state.weights.g/100);
    return {...d, e, s, g, total};
  });
}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

function overallScore(){
  const ds = deptScores();
  const avg = ds.reduce((a,d)=>a+d.total,0)/ds.length;
  return Math.round(avg);
}

function myXP(){
  const csr = employeeParticipation.filter(p=>p.employee===ME && p.approval==='Approved').reduce((a,p)=>a+p.points,0);
  const chal = challengeParticipation.filter(p=>p.employee===ME && p.approval==='Approved').reduce((a,p)=>a+p.xp,0);
  return csr+chal;
}
function myCompletedChallenges(){ return challengeParticipation.filter(p=>p.employee===ME && p.approval==='Approved').length; }
function myApprovedCsr(){ return employeeParticipation.filter(p=>p.employee===ME && p.approval==='Approved').length; }
function myAckPolicies(){ return policyAcknowledgements.filter(p=>p.employee===ME && p.status==='Acknowledged').length; }

function badgeUnlocked(b){
  if(b.rule.type==='xp') return myXP() >= b.rule.min;
  if(b.rule.type==='challenges') return myCompletedChallenges() >= b.rule.min;
  if(b.rule.type==='csr') return myApprovedCsr() >= b.rule.min;
  if(b.rule.type==='policies') return myAckPolicies() >= b.rule.min;
  return false;
}

function iconEl(name){return `<i class="ti ${name}" style="font-size:16px" aria-hidden="true"></i>`;}

function renderNav(){
  const el = document.getElementById('nav');
  el.innerHTML = nav.map(sec=>`

function esgRingSVG(score){
  const ds = deptScores();
  const e = Math.round(ds.reduce((a,d)=>a+d.e,0)/ds.length);
  const s = Math.round(ds.reduce((a,d)=>a+d.s,0)/ds.length);
  const g = Math.round(ds.reduce((a,d)=>a+d.g,0)/ds.length);
  const arc = (pct, r) => {
    const c = 2*Math.PI*r;
    return `${(pct/100)*c} ${c}`;
  };
  return `
  <svg width="168" height="168" viewBox="0 0 168 168">
    <circle cx="84" cy="84" r="72" fill="none" stroke="#242D26" stroke-width="10"/>
    <circle cx="84" cy="84" r="72" fill="none" stroke="#6FA287" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${arc(e,72)}" transform="rotate(-90 84 84)"/>
    <circle cx="84" cy="84" r="58" fill="none" stroke="#242D26" stroke-width="10"/>
    <circle cx="84" cy="84" r="58" fill="none" stroke="#6F93B8" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${arc(s,58)}" transform="rotate(-90 84 84)"/>
    <circle cx="84" cy="84" r="44" fill="none" stroke="#242D26" stroke-width="10"/>
    <circle cx="84" cy="84" r="44" fill="none" stroke="#C99A54" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${arc(g,44)}" transform="rotate(-90 84 84)"/>
    <text x="84" y="80" text-anchor="middle" font-family="Space Grotesk" font-size="30" font-weight="600" fill="#ECE9E1">${score}</text>
    <text x="84" y="99" text-anchor="middle" font-family="Inter" font-size="10.5" fill="#7C8279">ESG SCORE</text>
  </svg>`;
}

function progressPct(g){
  const pct = Math.round(((g.baseline-g.current)/(g.baseline-g.target))*100);

}

function statusPill(s){

function epRow(p){

  return `<tr>

        <button class="btn primary" data-ep-approve="${p.id}" ${blocked?'disabled title="Proof required"':''} style="margin-right:4px;">Approve</button>
        <button class="btn danger" data-ep-reject="${p.id}">Reject</button>` : ''}
    </td>
  </tr>`;
}

  employeeParticipation.filter(p=>p.approval==='Approved').forEach(p=>{ map[p.employee]=(map[p.employee]||0)+p.points; });
  challengeParticipation.filter(p=>p.approval==='Approved').forEach(p=>{ map[p.employee]=(map[p.employee]||0)+p.xp; });
  return Object.entries(map).map(([name,xp])=>({name,xp})).sort((a,b)=>b.xp-a.xp);
}

function weightSliderHTML(compact){
  const w = state.weights;
  const row = (key,label,color)=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:${compact?'6px':'10px'};">
      <span style="width:${compact?'70px':'90px'};font-size:${compact?'12px':'13px'};color:var(--text-mid);">${label}</span>
      <input type="range" min="0" max="100" step="5" value="${w[key]}" data-weight="${key}">
      <span class="mono" style="width:34px;text-align:right;font-size:12px;">${w[key]}%</span>
    </div>`;
  return row('e','Environmental','var(--env)') + row('s','Social','var(--soc)') + row('g','Governance','var(--gov)') +
    `<div class="small-muted" style="margin-top:4px;">Total: ${w.e+w.s+w.g}%</div>`;
}

/* ============ EVENTS ============ */

function bindEvents(){
  const wr = document.getElementById('weightRows');
  if(wr) wr.innerHTML = weightSliderHTML(true);
  const ws = document.getElementById('weightSliders');
  if(ws) ws.innerHTML = weightSliderHTML(false);

  document.querySelectorAll('[data-weight]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      state.weights[e.target.dataset.weight] = parseInt(e.target.value);
      renderAll();
    });
  });

  document.querySelectorAll('[data-toggle]').forEach(t=>{
    t.addEventListener('click', ()=>{
      const key = t.dataset.toggle;
      state.toggles[key] = !state.toggles[key];
      renderAll();
    });
  });

  const envSel = document.getElementById('envDeptFilter');
  if(envSel) envSel.addEventListener('change', e=>{ state.envDeptFilter = e.target.value; renderAll(); });

  const ciSel = document.getElementById('ciFilter');
  if(ciSel) ciSel.addEventListener('change', e=>{ state.ciFilter = e.target.value; renderAll(); });

  document.querySelectorAll('[data-ep-approve]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p = employeeParticipation.find(x=>x.id===b.dataset.epApprove);
      if(state.toggles.evidenceRequired && !p.proof) return;
      p.approval='Approved'; renderAll();
    });
  });
  document.querySelectorAll('[data-ep-reject]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p = employeeParticipation.find(x=>x.id===b.dataset.epReject);
      p.approval='Rejected'; p.points=0; renderAll();
    });
  });

  document.querySelectorAll('[data-ack]').forEach(b=>{
    b.addEventListener('click', ()=>{
      let a = policyAcknowledgements.find(x=>x.policy===b.dataset.ack && x.employee===ME);
      if(a){ a.status='Acknowledged'; a.date='2026-07-12'; }
      renderAll();
    });
  });

  document.querySelectorAll('[data-resolve]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const c = complianceIssues.find(x=>x.id===b.dataset.resolve);
      c.status='Resolved'; renderAll();
    });
  });

  document.querySelectorAll('[data-redeem]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const r = rewardsCatalog.find(x=>x.id===b.dataset.redeem);
      const xp = myXP();
      if(xp>=r.points && r.stock>0){
        r.stock -= 1;
        employeeParticipation.push({id:'EPX'+Date.now(), employee:ME, activity:'[Redemption] '+r.name, proof:true, approval:'Approved', points:-r.points, date:'2026-07-12'});
        renderAll();
      }
    });
  });
}

renderAll();
</script>
