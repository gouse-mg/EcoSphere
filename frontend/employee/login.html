<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoSphere — Employee Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-badge">Employee Portal</div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to track your XP, badges, and activities.</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button type="submit">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>
<script src="../assets/api.js"></script>
<script>
if (getToken() && getProfile()?.role === 'employee') window.location.href = 'index.html';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const data = await api.post('/employee/auth/login', { email, password });
    setToken(data.token);
    setProfile({ role: 'employee', ...data.employee });
    window.location.href = 'index.html';
  } catch (err) {
    errEl.textContent = err.message;
  }
});
</script>
</body>
</html>
